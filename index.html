    <style>
      .font-headline {

        font-variation-settings:

      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --shinhan-blue: #0046ff;
        --shinhan-deep: #002266;
        --shinhan-mint: #00e5d1;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: "Outfit", sans-serif;
        color: white;
      }

      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 40px;
        box-sizing: border-box;
      }

      .advisor-card {
        background: rgba(0, 34, 102, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 24px;
        max-width: 450px;
        pointer-events: auto;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .advisor-card.visible {
        transform: translateY(0);
        opacity: 1;
      }

      .advisor-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .avatar-indicator {
        width: 12px;
        height: 12px;
        background: var(--shinhan-mint);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--shinhan-mint);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.5);
          opacity: 0.5;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .advisor-name {
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
      }

      .advisor-text {
        font-size: 1rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 20px;
      }

      .btn-group {
        display: flex;
        gap: 12px;
      }

      .btn {
        background: var(--shinhan-blue);
        border: none;
        color: white;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: "Outfit", sans-serif;
      }

      .btn:hover {
        background: white;
        color: var(--shinhan-blue);
        transform: translateY(-2px);
      }

      .btn-outline {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .trigger-button {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        cursor: pointer;
        z-index: 10;
      }

      .logo {
        position: absolute;
        top: 30px;
        left: 40px;
        z-index: 10;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo span {
        color: var(--shinhan-mint);
      }

      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--shinhan-deep);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #fff;
        border-bottom-color: var(--shinhan-mint);
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .input-bar {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
        width: 90%;
        max-width: 550px;
        pointer-events: auto;
      }

      .input-bar input {
        flex: 1;
        background: rgba(0, 34, 102, 0.6);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 14px 20px;
        font-size: 1rem;
        color: white;
        font-family: "Outfit", sans-serif;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-bar input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .input-bar input:focus {
        border-color: var(--shinhan-mint);
      }

      .input-bar button {
        background: var(--shinhan-mint);
        color: var(--shinhan-deep);
        border: none;
        padding: 14px 24px;
        border-radius: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .input-bar button:hover {
        background: white;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 229, 209, 0.4);
      }
    </style>
